version: "2"
sql:
  - engine: "postgresql"
    queries: "queries/"
    schema: "schema/"
    gen:
      go:
        package: "db"
        out: "../internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_empty_slices: true
        emit_exact_table_names: false
        emit_prepared_queries: false
        emit_interface: true
        emit_methods_with_db_argument: false
        overrides:
          - db_type: "text[]"
            go_type: "[]string"
          - db_type: "pg_catalog.varchar"
            go_type: "string"
          - db_type: "pg_catalog.int8"
            go_type: "int64"
          - db_type: "pg_catalog.int4"
            go_type: "int32"
          - db_type: "pg_catalog.bool"
            go_type: "bool"
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - db_type: "jsonb"
            go_type: "string"
