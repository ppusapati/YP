name: flutter_ui_core
description: Shared UI components, theming, design tokens, and common widgets for YieldPoint apps.
version: 0.1.0
publish_to: none

resolution: workspace

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  gap: ^3.0.1
  flutter_riverpod: ^2.6.1
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
