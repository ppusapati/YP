name: flutter_storage
description: Local persistence layer using Drift (SQLite) and secure storage for YieldPoint.
version: 0.1.0
publish_to: none

resolution: workspace

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.0
  flutter_secure_storage: ^9.2.3
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.13
  mocktail: ^1.0.4
