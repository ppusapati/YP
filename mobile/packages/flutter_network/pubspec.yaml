name: flutter_network
description: Networking layer with ConnectRPC client, interceptors, and API configuration for YieldPoint.
version: 0.1.0
publish_to: none

resolution: workspace

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_proto:
    path: ../flutter_proto
  connectrpc: ^0.3.0
  protobuf: ^21.1.2
  http: ^1.2.2
  retry: ^3.1.2
  logging: ^1.3.0
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
