name: flutter_map_core
description: MapLibre-based mapping components, tile management, and geospatial utilities for YieldPoint.
version: 0.1.0
publish_to: none

resolution: workspace

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_network:
    path: ../flutter_network
  flutter_proto:
    path: ../flutter_proto
  flutter_storage:
    path: ../flutter_storage
  maplibre_gl: ^0.20.0
  geolocator: ^13.0.2
  latlong2: ^0.9.1
  turf: ^0.0.10
  cached_network_image: ^3.4.1
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.13
