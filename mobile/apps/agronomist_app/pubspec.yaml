name: agronomist_app
description: YieldPoint agronomist-facing mobile application for crop advisory, field inspections, and analytics.
version: 1.0.0+1
publish_to: none

resolution: workspace

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Workspace packages ──────────────────────────────────────────────
  flutter_auth:
    path: ../../packages/flutter_auth
  flutter_map_core:
    path: ../../packages/flutter_map_core
  flutter_network:
    path: ../../packages/flutter_network
  flutter_proto:
    path: ../../packages/flutter_proto
  flutter_storage:
    path: ../../packages/flutter_storage
  flutter_ui_core:
    path: ../../packages/flutter_ui_core

  # ── State management ────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # ── Networking & data ───────────────────────────────────────────────
  connectrpc: ^0.3.0
  protobuf: ^21.1.2
  http: ^1.2.2

  # ── Local storage ──────────────────────────────────────────────────
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  flutter_secure_storage: ^9.2.3
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5

  # ── Maps & location ────────────────────────────────────────────────
  maplibre_gl: ^0.20.0
  geolocator: ^13.0.2
  latlong2: ^0.9.1

  # ── Camera & media ─────────────────────────────────────────────────
  camera: ^0.11.0+2
  image: ^4.3.0
  image_picker: ^1.1.2
  photo_view: ^0.15.0

  # ── Charts ─────────────────────────────────────────────────────────
  fl_chart: ^0.70.2

  # ── Push notifications (direct APNs, no Firebase) ─────────────────
  flutter_local_notifications: ^18.0.1

  # ── Background work ────────────────────────────────────────────────
  workmanager: ^0.5.2

  # ── Navigation & UI ────────────────────────────────────────────────
  go_router: ^14.7.2
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  intl: ^0.19.0
  gap: ^3.0.1
  shimmer: ^3.0.0

  # ── Utilities ──────────────────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  uuid: ^4.5.1
  logging: ^1.3.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.1
  package_info_plus: ^8.1.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.22.1
  mocktail: ^1.0.4
  bloc_test: ^9.1.7
  golden_toolkit: ^0.15.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/map_styles/

  fonts:
    - family: YPIcons
      fonts:
        - asset: assets/fonts/YPIcons.ttf
