version: "2"
sql:
  - engine: "postgresql"
    queries: "queries/"
    schema: "schema/"
    gen:
      go:
        package: "db"
        out: "../internal/repositories/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_params_struct_pointers: false
        overrides:
          - db_type: "geometry"
            go_type: "string"
            nullable: true
          - db_type: "pg_catalog.text"
            go_type: "string"
            nullable: false
