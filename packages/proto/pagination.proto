syntax = "proto3";

package packages.api.v1.pagination;

option go_package = "p9e.in/samavaya/packages/api/v1/pagination;pagination";

import "google/protobuf/field_mask.proto";

message Pagination {
     // Number of items to skip for pagination
     int32 page_offset = 1;
     // Maximum number of items to return in response
     int32 page_size = 2;
     // Fields to sort by, default is id
     repeated string sort = 3;
     // Specific fields to include in the response
     google.protobuf.FieldMask fields = 4;
     // Complex filter criteria
}

// Alias for extension/land modules that reference PaginationRequest
message PaginationRequest {
     int32 page_offset = 1;
     int32 page_size = 2;
     repeated string sort = 3;
     google.protobuf.FieldMask fields = 4;
}

// Paginated list response wrapper
message PaginationResponse {
     int32 total_count = 1;
     int32 page_offset = 2;
     int32 page_size = 3;
     bool has_next = 4;
}