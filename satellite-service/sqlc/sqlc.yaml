version: "2"

sql:
  - engine: "postgresql"
    queries: "queries/"
    schema: "schema/"
    gen:
      go:
        package: "db"
        out: "../internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_empty_slices: true
        emit_exact_table_names: false
        emit_prepared_queries: false
        emit_interface: true
        overrides:
          - db_type: "geometry"
            go_type: "string"
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "text[]"
            go_type: "[]string"
          - db_type: "jsonb"
            go_type: "[]byte"
